<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TikTalk</title>
	<link rel="stylesheet" href="index.css">
</head>
<body>
	
	<div id="loginPage">
		<div class="login-container" id="loginContainer">
			<h2>Login to TikTalk</h2>
			<form id="loginForm">
				<div class="form-group">
					<label for="email">Email:</label>
					<input type="email" id="email" name="email" required>
				</div>
				<div class="form-group">
					<label for="password">Password:</label>
					<input type="password" id="password" name="password" required>
				</div>
				<button type="submit">Login</button>
			</form>
			<div id="loginError" class="error hidden"></div>
			<p class="switch-form">Don't have an account? <a href="#" id="showRegister">Create one</a></p>
		</div>

		<div class="login-container hidden" id="registerContainer">
			<h2>Create Account</h2>
			<form id="registerForm">
				<div class="form-group">
					<label for="regName">Name:</label>
					<input type="text" id="regName" name="name" required>
				</div>
				<div class="form-group">
					<label for="regEmail">Email:</label>
					<input type="email" id="regEmail" name="email" required>
				</div>
				<div class="form-group">
					<label for="regPassword">Password:</label>
					<input type="password" id="regPassword" name="password" required>
				</div>
				<button type="submit">Create Account</button>
			</form>
			<div id="registerError" class="error hidden"></div>
			<p class="switch-form">Already have an account? <a href="#" id="showLogin">Login</a></p>
		</div>

		<div id="app">
			<div id="sidePanel">
				<div id="sideHeader">
					<button id="talk" class="talk">Talk</button>
					<button>Account</button>
				</div>
				<div id="groupList"></div>
			</div>

			<div id="conv"></div>
		</div>


		<div id="account">
			<!-- userdata -->
			<div></div>

			<!-- disconnect button -->
			<button id="disconnect">Disconnect</button>
		</div>
	</div>

	<script>
		window.SERV_RQST_ADDRESS = "http://localhost:3247";
		window.SERV_SOCK_ADDRESS = "ws://localhost:3247";
	</script>

	<script type="module" src="index.ts"></script>
</body>
</html>
