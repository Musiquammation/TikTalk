<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>TikTalk - Login</title>
	<link rel="stylesheet" href="/login.css">
</head>
<body>
	<form id="loginForm">
		<h2>Login to TikTalk</h1>
		<input type="text" name="username" placeholder="Username" required />
		<input type="password" name="password" placeholder="Password" required />
		<button type="submit">Login</button>
		<span>Don't have an account? </span><a href="/signup.html">Sign up</a><br>
		<a href="/forgot.html" id="forgotPwdLink">Forgot password?</a>
		<p id="error" style="color:red; display: none;"></p>
	</form>
	
	
	<script src="/helper.js"></script>

	<script>
		document.getElementById('loginForm').onsubmit = async function(e) {
			e.preventDefault();
			const username = this.username.value;
			const password = this.password.value;
			const data = await goFetch(
				'/api/login',
				{ username, password },
				"POST"
			);

			if (data.sessionToken) {
				localStorage.setItem('sessionToken', data.sessionToken);
				gotoPage('app');
			} else {
				localStorage.removeItem('sessionToken');
				const el = document.getElementById('error');
				el.textContent = data.message || 'Login failed';
				el.style.display = 'block';
			}
		};
	</script>


</body>
</html>
